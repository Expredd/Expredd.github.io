<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Don't leave yet! – Bilgilerin</title>
  <style>
    body {
      font-family: monospace;
      background: #000;
      color: #0f0;
      padding: 15px;
      line-height: 1.5;
      margin: 0;
    }
    h1 { color: #0f0; margin: 0 0 15px; }
    h2 { color: #0f0; margin: 25px 0 8px; }
    pre {
      background: #111;
      padding: 10px;
      border: 1px solid #222;
      white-space: pre-wrap;
      word-break: break-all;
      margin: 8px 0;
      font-size: 13px;
    }
    .section { margin-bottom: 25px; }
    .status { color: #0f0; font-weight: bold; }
    .warning { color: #ff4444; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>Welcome, Eren Tunahan UÇAR!</h1>

  <div class="section">
    <h2>Gerçek Zamanlı Tarayıcı & Cihaz Bilgileri</h2>
    <pre id="client-info">Yükleniyor...</pre>
  </div>

  <div class="section">
    <h2>Tahmini IP ve Konum (sunucusuz)</h2>
    <pre id="ip-info">IP yükleniyor... (birkaç saniye sürebilir)</pre>
    <p class="warning">Not: Bu bilgi üçüncü taraf bir servisten (ip-api.com) çekiliyor.</p>
  </div>

  <script>
    // ────────────────────────────────────────────────
    // 1. Tarayıcı + Batarya + Donanım Bilgileri
    // ────────────────────────────────────────────────
    async function getClientInfo() {
      const nav = navigator;
      const scr = screen;
      const conn = nav.connection || {};

      let battery = { level: "—", charging: "—", chargingTime: "—", dischargingTime: "—" };

      if (nav.getBattery) {
        try {
          const bat = await nav.getBattery();
          battery = {
            level: `${Math.round(bat.level * 100)}%`,
            charging: bat.charging ? "Şarj oluyor ⚡" : "Şarjda değil",
            chargingTime: bat.chargingTime === Infinity ? "—" : `${bat.chargingTime} sn`,
            dischargingTime: bat.dischargingTime === Infinity ? "—" : `${bat.dischargingTime} sn`
          };
        } catch (e) {
          battery.level = "Batarya API desteklenmiyor / izin yok";
        }
      }

      return {
        Zaman: new Date().toLocaleString('tr-TR'),
        UserAgent: nav.userAgent,
        Platform: nav.platform || '—',
        Diller: nav.languages?.join(', ') || nav.language || '—',
        ZamanDilimi: Intl.DateTimeFormat().resolvedOptions().timeZone || '—',
        Ekran: `${scr.width} × ${scr.height}  (piksel oranı: ${window.devicePixelRatio.toFixed(2)})`,
        Pencere: `${window.innerWidth} × ${window.innerHeight}`,
        RenkDerinligi: `${scr.colorDepth} bit`,
        CPUÇekirdek: nav.hardwareConcurrency || 'bilinmiyor',
        RAM_Tahmini: nav.deviceMemory ? `${nav.deviceMemory} GB` : 'bilinmiyor',
        Bağlantı: conn.effectiveType ? `${conn.effectiveType} (~${conn.downlink || '?'} Mbps)` : '—',
        Batarya: `${battery.level}  –  ${battery.charging}`,
        ŞarjKalanSüre: battery.dischargingTime,
        ŞarjOlmaSüresi: battery.chargingTime,
        DokunmatikNokta: nav.maxTouchPoints || '—',
        Vendor: nav.vendor || '—',
        Çevrimiçi: nav.onLine ? 'Evet' : 'Hayır'
      };
    }

    function updateClientDisplay() {
      getClientInfo().then(info => {
        document.getElementById('client-info').textContent = JSON.stringify(info, null, 2);
      });
    }

    // ────────────────────────────────────────────────
    // 2. IP + yaklaşık konum çekme (sunucusuz)
    // ────────────────────────────────────────────────
    async function fetchIPInfo() {
      try {
        const res = await fetch('https://ipapi.co/json/');
        // Alternatif: 'http://ip-api.com/json/' de kullanılabilir
        const data = await res.json();

        if (data.ip) {
          const info = {
            IP: data.ip,
            Şehir: data.city || '—',
            Ülke: data.country_name || data.country || '—',
            Bölge: data.region || '—',
            Enlem_Boylam: `${data.latitude || '?'} , ${data.longitude || '?'}`,
            ISP: data.org || data.asn || '—',
            SaatDilimi: data.timezone || '—'
          };
          document.getElementById('ip-info').textContent = JSON.stringify(info, null, 2);
        } else {
          throw new Error("IP alınamadı");
        }
      } catch (err) {
        document.getElementById('ip-info').textContent = 
          "IP bilgisi alınamadı.\n" +
          "Sebep: " + err.message + "\n" +
          "(Adblock / VPN / ağ kısıtlaması olabilir)";
      }
    }

    // Başlat
    window.addEventListener('load', () => {
      updateClientDisplay();
      fetchIPInfo();

      // Batarya ve bağlantı değişirse güncelle
      setInterval(updateClientDisplay, 8000);
    });

    // Ekran boyutu değişirse güncelle
    window.addEventListener('resize', updateClientDisplay);
  </script>
</body>
</html>
