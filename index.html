<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Don't leave yet!</title>
  <style>
    body {
      font-family: monospace;
      background: #000;
      color: #0f0;
      padding: 15px;
      line-height: 1.5;
      margin: 0;
    }
    h1 {
      color: #0f0;
      margin: 0 0 15px;
    }
    h2 {
      color: #0f0;
      margin: 25px 0 8px;
    }
    pre {
      background: #111;
      padding: 10px;
      border: 1px solid #222;
      white-space: pre-wrap;
      word-break: break-all;
      margin: 8px 0;
      font-size: 13px;
    }
    #log {
      max-height: 280px;
      overflow-y: auto;
      background: #000;
      padding: 10px;
      border: 1px solid #333;
      margin: 15px 0;
      font-size: 13px;
    }
    button {
      background: #002200;
      color: #0f0;
      border: 1px solid #0f0;
      padding: 8px 16px;
      margin: 6px 10px 6px 0;
      cursor: pointer;
    }
    button:hover {
      background: #004400;
    }
    .section {
      margin-bottom: 20px;
    }
    #server-info {
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>Welcome, Eren Tunahan UÇAR!</h1>

  <div class="section">
    <h2>About You (sunucu tarafı bilgi):</h2>
    <pre id="server-info">Bu kısım Flask çalışırken dolar.
Şu anda statik HTML'de olduğun için burası boş kalacak.
Orijinal uygulamada IP, konum, User-Agent vs. buraya yazılıyor.</pre>
  </div>

  <div class="section">
    <h2>Information Your Browser Gave Us:</h2>
    <pre id="client-info">Yükleniyor...</pre>
  </div>

  <script>
    // Tarayıcıdan alınabilecek bilgileri topla
    function getClientInfo() {
      const nav = navigator;
      const scr = screen;
      const conn = nav.connection || {};

      let batteryInfo = "Batarya bilgisi yok veya desteklenmiyor";

      // Batarya bilgisi (asenkron)
      if (nav.getBattery) {
        nav.getBattery().then(b => {
          batteryInfo = `Batarya: %${Math.round(b.level * 100)}  (${b.charging ? "şarj oluyor" : "şarjda değil"}, kalan: ${b.dischargingTime === Infinity ? "bilinmiyor" : b.dischargingTime + " sn"})`;
          updateClientInfo();
        }).catch(() => {});
      }

      const info = {
        userAgent: nav.userAgent,
        platform: nav.platform || '—',
        languages: nav.languages?.join(', ') || nav.language || '—',
        cookieEnabled: nav.cookieEnabled,
        onLine: nav.onLine,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || '—',
        screen: `${scr.width} × ${scr.height} (piksel oranı: ${window.devicePixelRatio.toFixed(2)})`,
        windowInner: `${window.innerWidth} × ${window.innerHeight}`,
        colorDepth: `${scr.colorDepth} bit`,
        hardwareConcurrency: nav.hardwareConcurrency || 'bilinmiyor',
        deviceMemory: nav.deviceMemory ? `${nav.deviceMemory} GB (yaklaşık)` : 'bilinmiyor',
        connection: conn.effectiveType ? `${conn.effectiveType} (${conn.downlink || '?'} Mbps)` : 'bilinmiyor',
        battery: batteryInfo,
        vendor: nav.vendor || '—',
        maxTouchPoints: nav.maxTouchPoints || '—',
        plugins: Array.from(nav.plugins).map(p => p.name).join(', ') || '—',
        collectedAt: new Date().toISOString()
      };

      return info;
    }

    function updateClientInfo() {
      const info = getClientInfo();
      document.getElementById('client-info').textContent = JSON.stringify(info, null, 2);
      
      // İstersen konsola da yazdır
      console.log("Tarayıcı Bilgileri:", info);
    }

    // Sayfa yüklendiğinde çalıştır
    window.addEventListener('load', () => {
      updateClientInfo();

      // Batarya bilgisi gecikmeli gelebildiği için 1.5 sn sonra tekrar güncelle
      setTimeout(updateClientInfo, 1500);
    });

    // Ekran boyutu değişirse güncelle (ör: döndürme, pencere boyutlandırma)
    window.addEventListener('resize', updateClientInfo);
  </script>

</body>
</html>
